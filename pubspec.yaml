name: libdbm
version: 0.4.0
description: >-
  A fast, zero-dependency, disk-based key-value store for Dart.
  Hash tables, B+trees with sorted iteration and range queries,
  versioned transactions, and a familiar Map API.
repository: https://github.com/libdbm/libdbm
issue_tracker: https://github.com/libdbm/libdbm/issues
topics:
  - database
  - storage
  - key-value
  - persistence

environment:
  sdk: ">=3.0.0 <5.0.0"

dev_dependencies:
  lints: ^6.1.0
  faker: ^2.2.0
  test: ^1.24.0
  collection: ^1.18.0

